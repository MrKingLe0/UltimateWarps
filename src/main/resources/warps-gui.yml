  # Example: Decorative items
  top-border:
    enabled: true
    slots: [0, 1, 2, 3, 4, 5, 6, 7, 8, 45, 46, 47, 48, 49, 50, 51, 52, 53]
    material: "PURPLE_STAINED_GLASS_PANE"
    name: " "
    lore: []
    amount: 1
    
  bottom-border:
    enabled: true
    slots: [9, 10, 11, 12, 13, 14, 15, 16, 17, 36, 37, 38, 39, 40, 41, 42, 43, 44]
    material: "BLUE_STAINED_GLASS_PANE"
    name: " "
    lore: []
    amount: 1
    
