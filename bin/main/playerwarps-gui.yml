# =====================================================================
#  UltimateWarps - Player Warps GUI Configuration
#  Entirely separate from warps-gui.yml (the admin warp GUI). Customize
#  every slot and button in the player-warps browser menu here.
# =====================================================================

gui:
  title: "&b&lбҙҳКҹбҙҖКҸбҙҮКҖ бҙЎбҙҖКҖбҙҳs"
  rows: 6
  fill-empty-slots: true
  fill-item:
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
    lore: []
    amount: 1
    enchanted: false

click-sound:
  sound: "UI_BUTTON_CLICK"
  volume: 1.0
  pitch: 1.0

# Item template for a player warp that ISN'T owned by the viewer.
warp-item:
  material: "PLAYER_HEAD"
  name: "&b&l{warp_name}"
  lore:
    - ""
    - "&7бҙҸбҙЎЙҙбҙҮКҖ: &f{owner}"
    - "&7бҙ„бҙҸбҙҸКҹбҙ…бҙҸбҙЎЙҙ: &e{cooldown}s"
    - "&7бҙ…бҙҮКҹбҙҖКҸ: &e{delay}s"
    - ""
    - "&bбҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ"
  amount: 1
  enchanted: false
  head-texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNDQxYTAyNTMwMDBjMmIyOGQzODY0MjZiZDM4YTRmMmQ3NmViY2RkMDdmNjc1ZTExYjNlNjgxNGM2YThhMmVhIn19fQ=="

# Item template for a player warp the viewer OWNS - shown with different
# lore (no "owner" line, an edit hint instead) so it's visually obvious
# which warps in the list are yours.
own-warp-item:
  material: "PLAYER_HEAD"
  name: "&e&l{warp_name} &7(КҸбҙҸбҙңКҖs)"
  lore:
    - ""
    - "&7бҙ„бҙҸбҙҸКҹбҙ…бҙҸбҙЎЙҙ: &e{cooldown}s"
    - "&7бҙ…бҙҮКҹбҙҖКҸ: &e{delay}s"
    - "&7бҙ ЙӘsЙӘКҷЙӘКҹЙӘбҙӣКҸ: &f{visibility}"
    - ""
    - "&bбҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ"
    - "&eкңұКңЙӘкҹ»бҙӣ+бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙҮбҙ…ЙӘбҙӣ"
  amount: 1
  enchanted: false
  head-texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNDQxYTAyNTMwMDBjMmIyOGQzODY0MjZiZDM4YTRmMmQ3NmViY2RkMDdmNjc1ZTExYjNlNjgxNGM2YThhMmVhIn19fQ=="

warp-slots:
  mode: "auto"
  auto-start: 9
  auto-end: 44

buttons:
  previous-page:
    enabled: true
    slot: 45
    material: "PLAYER_HEAD"
    name: "&bвҶҗ бҙҳКҖбҙҮбҙ ЙӘбҙҸбҙңs бҙҳбҙҖЙўбҙҮ"
    lore:
      - "&eбҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ ЙўбҙҸ бҙӣбҙҸ бҙҳКҖбҙҮбҙ ЙӘбҙҸбҙңs бҙҳбҙҖЙўбҙҮ"
    amount: 1
    head-texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNjllYTFkODYyNDdmNGFmMzUxZWQxODY2YmNhNmEzMDQwYTA2YzY4MTc3Yzc4ZTQyMzE2YTEwOThlNjBmYjdkMyJ9fX0="
    hide-if-no-previous: true

  next-page:
    enabled: true
    slot: 53
    material: "PLAYER_HEAD"
    name: "&bЙҙбҙҮxбҙӣ бҙҳбҙҖЙўбҙҮ вҶ’"
    lore:
      - "&eбҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ ЙўбҙҸ бҙӣбҙҸ ЙҙбҙҮxбҙӣ бҙҳбҙҖЙўбҙҮ"
    amount: 1
    head-texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvODI3MWE0NzEwNDQ5NWUzNTdjM2U4ZTgwZjUxMWE5ZjEwMmIwNzAwY2E5Yjg4ZTg4Yjc5NWQzM2ZmMjAxMDVlYiJ9fX0="
    hide-if-no-next: true

  # Toggle between "everyone's public warps" and "just my warps".
  filter-toggle:
    enabled: true
    slot: 46
    material: "HOPPER"
    name: "&d&lкң°ЙӘКҹбҙӣбҙҮКҖ: {filter}"
    lore:
      - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙӣбҙҸЙўЙўКҹбҙҮ КҷбҙҮбҙӣбҙЎбҙҮбҙҮЙҙ"
      - "&7бҙҖКҹКҹ бҙЎбҙҖКҖбҙҳs бҙҖЙҙбҙ… КҸбҙҸбҙңКҖ бҙҸбҙЎЙҙ"
    amount: 1

  # Opens the "create new warp here" flow (equivalent to /playerwarps set).
  create-warp:
    enabled: true
    slot: 47
    material: "EMERALD"
    name: "&a&lбҙ„КҖбҙҮбҙҖбҙӣбҙҮ бҙҖ бҙЎбҙҖКҖбҙҳ"
    lore:
      - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ„КҖбҙҮбҙҖбҙӣбҙҮ бҙҖ бҙЎбҙҖКҖбҙҳ бҙҖбҙӣ"
      - "&7КҸбҙҸбҙңКҖ бҙ„бҙңКҖКҖбҙҮЙҙбҙӣ КҹбҙҸбҙ„бҙҖбҙӣЙӘбҙҸЙҙ"
      - ""
      - "&7бҙңsбҙҖЙўбҙҮ: бҙ„КҹбҙҸsбҙҮ бҙӣКңЙӘs бҙҚбҙҮЙҙбҙң, бҙӣКңбҙҮЙҙ"
      - "&7/бҙҳКҹбҙҖКҸбҙҮКҖбҙЎбҙҖКҖбҙҳs sбҙҮбҙӣ <ЙҙбҙҖбҙҚбҙҮ>"
    amount: 1

  close:
    enabled: true
    slot: 49
    material: "BARRIER"
    name: "&c&lбҙ„КҹбҙҸsбҙҮ"
    lore:
      - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ„КҹбҙҸsбҙҮ бҙӣКңбҙҮ бҙҚбҙҮЙҙбҙң"
    amount: 1

  info:
    enabled: true
    slot: 51
    material: "PAPER"
    name: "&f&lбҙҳбҙҖЙўбҙҮ {current}/{total}"
    lore:
      - "&7бҙ„бҙңКҖКҖбҙҮЙҙбҙӣКҹКҸ бҙ ЙӘбҙҮбҙЎЙӘЙҙЙў бҙҳбҙҖЙўбҙҮ {current}"
      - "&7бҙҸкң° {total} бҙӣбҙҸбҙӣбҙҖКҹ бҙҳбҙҖЙўбҙҮs"
      - ""
      - "&7КҸбҙҸбҙңКҖ бҙЎбҙҖКҖбҙҳs: &f{owned}&7/&f{limit}"
    amount: 1
    update-on-each-page: true

custom-items:
  top-border:
    enabled: true
    slots: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    material: "CYAN_STAINED_GLASS_PANE"
    name: " "
    lore: []
    amount: 1

  bottom-border:
    enabled: true
    slots: [48, 50, 52]
    material: "CYAN_STAINED_GLASS_PANE"
    name: " "
    lore: []
    amount: 1
